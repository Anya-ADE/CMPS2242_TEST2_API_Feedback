<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
    <link rel="stylesheet" href="/UI/styles.css">
</head>
<body>
    <div class="container">
        <h1>Feedback Form</h1>
        
        <form id="feedbackForm">
            <div class="form-group">
                <label>Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter Name" required>
                <div class="placeholder-text">Enter your full name </div>
                <div class="error-text" id="nameError"></div>
            </div>
            
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter email" required>
                <div class="placeholder-text">Enter a valid email address (e.g., name@example.com)</div>
                <div class="error-text" id="emailError"></div>
            </div>
            
            <div class="form-group">
                <label>Subject:</label>
                <input type="text" id="subject" name="subject" placeholder="Enter subject" required>
                <div class="placeholder-text">Enter the subject of your feedback</div>
                <div class="error-text" id="subjectError"></div>
            </div>
            
            <div class="form-group">
                <label>Message:</label>
                <textarea id="message" name="message" placeholder="Enter message" required></textarea>
                <div class="placeholder-text">Enter your message here </div>
                <div class="error-text" id="messageError"></div>
            </div>
            
            <button type="submit">Submit</button>
        </form>
        
        <div id="messageArea" class="message"></div>
    </div>

    <script src="/UI/script.js"></script>
</body>
</html>
